<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>FitWeb — Mis Records</title>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>

<div class="page-content">
    <div class="records-header">
        <div class="section-title" style="margin:0">Mis records personales (PR)</div>
        <button class="btn-sm" onclick="openModal()">+ Añadir record</button>
    </div>
    <div class="card">
        <table class="records-table">
            <thead>
            <tr>
                <th>Ejercicio</th><th>Peso max.</th><th>Reps</th><th>Fecha</th><th></th>
            </tr>
            </thead>
            <tbody id="records-body"></tbody>
        </table>
        <div id="records-empty" style="text-align:center;padding:2rem;color:var(--text3)">
            Aun no tienes records guardados.
        </div>
    </div>
    <div class="stats-grid" style="margin-top:1.2rem">
        <div class="stat-card">
            <div class="sc-label">Total de records</div>
            <div class="sc-val sc-accent" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <div class="sc-label">Mayor peso levantado</div>
            <div class="sc-val" id="stat-maxpeso">— kg</div>
            <div class="sc-sub" id="stat-maxpeso-ej">—</div>
        </div>
        <div class="stat-card">
            <div class="sc-label">Max. repeticiones</div>
            <div class="sc-val" id="stat-maxreps">—</div>
            <div class="sc-sub" id="stat-maxreps-ej">—</div>
        </div>
        <div class="stat-card">
            <div class="sc-label">Ultimo registro</div>
            <div class="sc-val" id="stat-ultimo" style="font-size:16px">—</div>
        </div>
    </div>
</div>

<div class="modal-overlay hidden" id="record-modal" onclick="handleOverlayClick(event)">
    <div class="modal">
        <h3>Añadir record personal</h3>
        <div class="form-group">
            <label>Ejercicio</label>
            <input type="text" id="rec-ejercicio" placeholder="Ej: Sentadilla"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
                <label>Peso maximo (kg)</label>
                <input type="number" id="rec-peso" placeholder="100" min="0"/>
            </div>
            <div class="form-group">
                <label>Repeticiones</label>
                <input type="number" id="rec-reps" placeholder="5" min="1"/>
            </div>
        </div>
        <div id="modal-error" class="error-msg hidden"></div>
        <div class="modal-footer">
            <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
            <button class="btn-sm" onclick="saveRecord()">Guardar</button>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
    renderNav('records');
</script>
<script>
    const user = requireAuth();
    document.getElementById('topbar-username').textContent = user.nombre.split(' ')[0];
    document.getElementById('user-avatar').textContent = getInitials(user.nombre);

    async function loadRecords() {
        try {
            const data = await apiGetRecords(user.id);
            renderRecords(data);
            renderStats(data);
        } catch(e) { console.error(e); }
    }

    function renderRecords(data) {
        const tbody = document.getElementById('records-body');
        const empty = document.getElementById('records-empty');
        if (!data.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        tbody.innerHTML = data.map(r => `
            <tr>
                <td>${r.ejercicio}<span class="pr-badge">PR</span></td>
                <td><strong>${r.pesoMaximo} kg</strong></td>
                <td>${r.repeticiones} reps</td>
                <td style="color:var(--text2)">${r.fecha}</td>
                <td>
                    <button onclick="deleteRecord(${r.id})" style="background:none;border:none;color:var(--red);cursor:pointer;padding:4px" title="Eliminar">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    </button>
                </td>
            </tr>`).join('');
    }

    function renderStats(data) {
        document.getElementById('stat-total').textContent = data.length;
        if (!data.length) return;
        const maxPeso = data.reduce((a, b) => a.pesoMaximo > b.pesoMaximo ? a : b);
        const maxReps = data.reduce((a, b) => a.repeticiones > b.repeticiones ? a : b);
        const ultimo = data[data.length - 1];
        document.getElementById('stat-maxpeso').textContent = maxPeso.pesoMaximo + ' kg';
        document.getElementById('stat-maxpeso-ej').textContent = maxPeso.ejercicio;
        document.getElementById('stat-maxreps').textContent = maxReps.repeticiones + ' reps';
        document.getElementById('stat-maxreps-ej').textContent = maxReps.ejercicio;
        document.getElementById('stat-ultimo').textContent = ultimo.ejercicio + ' · ' + ultimo.fecha;
    }

    function openModal() {
        document.getElementById('modal-error').classList.add('hidden');
        document.getElementById('rec-ejercicio').value = '';
        document.getElementById('rec-peso').value = '';
        document.getElementById('rec-reps').value = '';
        document.getElementById('record-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('record-modal').classList.add('hidden'); }
    function handleOverlayClick(e) { if (e.target === document.getElementById('record-modal')) closeModal(); }

    async function saveRecord() {
        const ej = document.getElementById('rec-ejercicio').value.trim();
        const pe = parseFloat(document.getElementById('rec-peso').value);
        const re = parseInt(document.getElementById('rec-reps').value);
        const errEl = document.getElementById('modal-error');
        if (!ej || isNaN(pe) || isNaN(re)) { errEl.textContent = 'Rellena todos los campos correctamente.'; errEl.classList.remove('hidden'); return; }
        errEl.classList.add('hidden');
        try { await apiCrearRecord(user.id, ej, pe, re); closeModal(); await loadRecords(); }
        catch(e) { errEl.textContent = 'Error al guardar el record.'; errEl.classList.remove('hidden'); }
    }

    async function deleteRecord(id) {
        if (!confirm('Eliminar este record?')) return;
        try { await apiEliminarRecord(id); await loadRecords(); }
        catch(e) { console.error(e); }
    }

    loadRecords();
</script>
</body>
</html>
