<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>FitWeb — Ejercicios</title>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>

<div class="page-content">
    <div class="section-title">Biblioteca de ejercicios</div>
    <div style="margin-bottom:1rem">
        <input type="text" id="search-input" placeholder="Buscar ejercicio..."
               style="width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:9px 14px;font-size:14px;outline:none"
               oninput="searchExercises(this.value)"/>
    </div>
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterEx('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filterEx('fuerza', this)">Fuerza</button>
        <button class="filter-btn" onclick="filterEx('cardio', this)">Cardio</button>
        <button class="filter-btn" onclick="filterEx('estiramiento', this)">Estiramientos</button>
        <button class="filter-btn" onclick="filterEx('movilidad', this)">Movilidad</button>
    </div>
    <div class="exercise-grid" id="exercise-grid">
        <div style="color:var(--text3);font-size:14px">Cargando ejercicios...</div>
    </div>
</div>

<div class="ex-modal-overlay hidden" id="ex-modal" onclick="handleOverlayClick(event)">
    <div class="ex-modal">
        <div class="ex-modal-video">
            <iframe id="ex-modal-iframe" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>
        <div class="ex-modal-body">
            <div class="ex-modal-header">
                <div class="ex-modal-title" id="ex-modal-title"></div>
                <button class="ex-modal-close" onclick="closeExModal()">×</button>
            </div>
            <div class="ex-modal-tags" id="ex-modal-tags"></div>
            <div class="ex-modal-desc" id="ex-modal-desc"></div>
            <div class="ex-modal-warn hidden" id="ex-modal-warn"></div>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
    renderNav('ejercicios');
</script>
<script>
    const user = requireAuth();
    document.getElementById('topbar-username').textContent = user.nombre.split(' ')[0];
    document.getElementById('user-avatar').textContent = getInitials(user.nombre);

    const svgIcon = `<svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>`;
    const svgPlay = `<svg width="11" height="11" viewBox="0 0 24 24" fill="var(--accent3)"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    const svgWarn = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;

    let allExercises = [];

    async function loadExercises() {
        try {
            allExercises = await apiGetEjercicios();
            renderExercises('todos');
        } catch(e) {
            document.getElementById('exercise-grid').innerHTML = '<div style="color:var(--red);font-size:14px">Error cargando ejercicios.</div>';
        }
    }

    function buildCard(e, lesiones) {
        const warn = e.lesionesRelacionadas && e.lesionesRelacionadas.some(l => lesiones.includes(l));
        return `<div class="ex-card${warn ? ' has-lesion' : ''}" onclick="openExModal(${e.id})">
          <div class="ex-top">
            <div class="ex-icon">${svgIcon}</div>
            <div>
              <div class="ex-name">${e.nombre}</div>
              <div class="ex-cat">${e.categoria.charAt(0).toUpperCase() + e.categoria.slice(1)}</div>
            </div>
          </div>
          <div class="ex-meta"><span>${e.musculo}</span><span>${e.series}</span></div>
          ${warn ? `<div class="ex-warn">${svgWarn} Adaptar por lesion en ${e.lesionesRelacionadas.filter(l => lesiones.includes(l)).join(', ')}</div>` : ''}
          <div style="margin-top:10px;font-size:11px;color:var(--accent3);display:flex;align-items:center;gap:4px">${svgPlay} Ver tutorial en YouTube</div>
        </div>`;
    }

    function renderExercises(cat) {
        const grid = document.getElementById('exercise-grid');
        const lesiones = user.lesiones || [];
        const filtered = cat === 'todos' ? allExercises : allExercises.filter(e => e.categoria === cat);
        if (!filtered.length) { grid.innerHTML = '<div style="color:var(--text3);font-size:14px">No hay ejercicios en esta categoria.</div>'; return; }
        grid.innerHTML = filtered.map(e => buildCard(e, lesiones)).join('');
    }

    function filterEx(cat, btn) {
        document.getElementById('search-input').value = '';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderExercises(cat);
    }

    function searchExercises(query) {
        const q = query.toLowerCase().trim();
        if (!q) { renderExercises('todos'); return; }
        const lesiones = user.lesiones || [];
        const filtered = allExercises.filter(e =>
            e.nombre.toLowerCase().includes(q) || e.musculo.toLowerCase().includes(q) || e.categoria.toLowerCase().includes(q)
        );
        const grid = document.getElementById('exercise-grid');
        if (!filtered.length) { grid.innerHTML = '<div style="color:var(--text3);font-size:14px">No se encontraron ejercicios.</div>'; return; }
        grid.innerHTML = filtered.map(e => buildCard(e, lesiones)).join('');
    }

    function openExModal(id) {
        const e = allExercises.find(ex => ex.id === id);
        if (!e) return;
        const lesiones = user.lesiones || [];
        document.getElementById('ex-modal-title').textContent = e.nombre;
        document.getElementById('ex-modal-iframe').src = `https://www.youtube.com/embed/${e.youtubeid}?autoplay=1&rel=0`;
        document.getElementById('ex-modal-tags').innerHTML = [
            `<span class="ex-modal-tag"><strong>Musculo</strong> ${e.musculo}</span>`,
            `<span class="ex-modal-tag"><strong>Series</strong> ${e.series}</span>`,
            `<span class="ex-modal-tag"><strong>Tipo</strong> ${e.categoria}</span>`
        ].join('');
        document.getElementById('ex-modal-desc').textContent = e.descripcion || '';
        const warnEl = document.getElementById('ex-modal-warn');
        const affected = e.lesionesRelacionadas ? e.lesionesRelacionadas.filter(l => lesiones.includes(l)) : [];
        if (affected.length) {
            warnEl.textContent = 'Precaucion: este ejercicio puede afectar tu lesion en ' + affected.join(', ') + '. Consulta con tu medico o reduce la carga.';
            warnEl.classList.remove('hidden');
        } else { warnEl.classList.add('hidden'); }
        document.getElementById('ex-modal').classList.remove('hidden');
    }

    function closeExModal() {
        document.getElementById('ex-modal').classList.add('hidden');
        document.getElementById('ex-modal-iframe').src = '';
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('ex-modal')) closeExModal();
    }

    loadExercises();
</script>
</body>
</html>
