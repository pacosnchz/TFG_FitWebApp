services:

  # ── Base de datos PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: fitweb_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitweb_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - fitweb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitweb_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplicación Spring Boot ──
  app:
    build: .
    container_name: fitweb_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fitweb_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  fitweb_pgdata:
